  {city:"Savannah",       state:"GA", stateLabel:"Georgia",          county:"Chatham",    oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Greer",          state:"SC", stateLabel:"South Carolina",   county:"Greenville", oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Columbia",       state:"SC", stateLabel:"South Carolina",   county:"Richland",   oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Birmingham",     state:"AL", stateLabel:"Alabama",          county:"Jefferson",  oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Montgomery",     state:"AL", stateLabel:"Alabama",          county:"Montgomery", oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Charleston",     state:"SC", stateLabel:"South Carolina",   county:"Charleston", oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Columbus",       state:"OH", stateLabel:"Ohio",             county:"Franklin",   oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Cleveland",      state:"OH", stateLabel:"Ohio",             county:"Cuyahoga",   oem:"Bus Climate Control", role:"Dealer/Distributor"},
  {city:"Louisville",     state:"KY", stateLabel:"Kentucky",         county:"Jefferson",  oem:"Bus Climate Control", role:"Dealer/Distributor"},
];

const coords = {
  Columbus:         [39.96, -83.00],
  Cleveland:        [41.49, -81.69],
  Youngstown:       [41.09, -80.64],
  Toledo:           [41.65, -83.53],
  Dearborn:         [42.32, -83.17],
  "Grand Rapids":   [42.96, -85.66],
  Saginaw:          [43.42, -83.95],
  Atlanta:          [33.74, -84.38],
  Savannah:         [32.08, -81.09],
  Greer:            [34.94, -82.23],
  Columbia:         [34.00, -81.03],
  Birmingham:       [33.52, -86.81],
  Montgomery:       [32.37, -86.30],
  Charleston:       [32.78, -79.93],
  Phoenix:          [33.44, -112.07],
  "Las Vegas":      [36.17, -115.14],
  Tucson:           [32.22, -110.97],
  "Fort Wayne":     [41.07, -85.14],
  Nashville:        [36.16, -86.78],
  Louisville:       [38.25, -85.76],
  Boston:           [42.36, -71.06],
  Providence:       [41.82, -71.42],
  Portland:         [43.66, -70.26],   // Maine
  "Portland":       [45.52, -122.67],  // Oregon — handled by state below
  Seattle:          [47.61, -122.33],
  Oakland:          [37.80, -122.27],
  Guadalajara:      [20.66, -103.35],
  "Mexico City":    [19.43, -99.13],
  "Querétaro":      [20.59, -100.39],
  Cananea:          [30.99, -110.29],
  Cartersville:     [34.17, -84.80],
  "Ball Ground":    [34.34, -84.37],
};

// Portland disambiguation: Maine vs Oregon
function getCityCoords(city, state) {
  if (city === "Portland") {
    return state === "OR" ? [45.52, -122.67] : [43.66, -70.26];
  }
  return coords[city] || null;
}

let countyLayer, stateLayer, mexicoLayer;
let markers = [];

// US state full names for GeoJSON matching
const stateFullName = {
  OH:"Ohio", MI:"Michigan", GA:"Georgia", SC:"South Carolina", AL:"Alabama",
  AZ:"Arizona", NV:"Nevada", TN:"Tennessee", KY:"Kentucky", IN:"Indiana",
  MA:"Massachusetts", ME:"Maine", RI:"Rhode Island", OR:"Oregon", WA:"Washington", CA:"California"
};

// Mexico state names as they appear in the GeoJSON
const mexicoStateNames = {
  "MX-JAL": "Jalisco",
  "MX-CMX": "Ciudad de México",
  "MX-SON": "Sonora",
  "MX-QUE": "Querétaro"
};

function getActiveUSStates(selectedOEM) {
  return [...new Set(
    data.filter(d => d.oem === selectedOEM && !d.state.startsWith("MX-"))
        .map(d => stateFullName[d.state])
        .filter(Boolean)
  )];
}

function getActiveMexicoStates(selectedOEM) {
  return [...new Set(
    data.filter(d => d.oem === selectedOEM && d.state.startsWith("MX-"))
        .map(d => mexicoStateNames[d.state])
        .filter(Boolean)
  )];
}

function styleUSState(feature, selectedOEM) {
  const active = getActiveUSStates(selectedOEM);
  const name = feature.properties.name || feature.properties.NAME;
  if (active.includes(name)) {
    return { fillColor:"#0060a9", fillOpacity:0.18, color:"#666", weight:1 };
  }
  return { fillOpacity:0, color:"#bbb", weight:1 };
}

function getCountyStyle(feature, selectedOEM) {
  const countyName = feature.properties.NAME;
  const stateCode = feature.properties.STATE;
  const match = data.find(d =>
    d.oem === selectedOEM &&
    d.county === countyName &&
    stateFips[d.state] === stateCode
  );
  if (match) {
    return { fillColor:"#0060a9", fillOpacity:0.75, color:"#444", weight:0.5 };
  }
  return { fillOpacity:0, color:"#999", weight:0.5 };
}

function styleMexicoState(feature, selectedOEM) {
  const active = getActiveMexicoStates(selectedOEM);
  const name = feature.properties.name || feature.properties.NAME || feature.properties.state_name;
  if (active.includes(name)) {
    return { fillColor:"#0060a9", fillOpacity:0.18, color:"#666", weight:1 };
  }
  return { fillOpacity:0, color:"#bbb", weight:1 };
}

function drawMarkers(selectedOEM) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  // Deduplicate by city+state for this OEM (in case of duplicate rows)
  const seen = new Set();
  data.forEach(d => {
    if (d.oem !== selectedOEM) return;
    const key = `${d.city}|${d.state}`;
    if (seen.has(key)) return;
    seen.add(key);

    const c = getCityCoords(d.city, d.state);
    if (!c) return;

    let iconHtml;
    if (d.role === "Dealer") {
      iconHtml = `<div style="width:12px;height:12px;background:white;border:1.5px solid #555;border-radius:50%;box-sizing:border-box;"></div>`;
    } else if (d.role === "Distributor") {
      iconHtml = `<div style="width:12px;height:12px;background:white;border:1.5px solid #555;border-radius:0;box-sizing:border-box;"></div>`;
    } else if (d.role === "Dealer/Distributor") {
      iconHtml = `<div style="width:12px;height:12px;background:white;border:1.5px solid #555;border-radius:0;outline:2px solid #555;outline-offset:2px;box-sizing:border-box;"></div>`;
    } else {
      // Service Provider, Wholesale Partner, etc.
      iconHtml = `<div style="width:12px;height:12px;background:#aaa;border:1.5px solid #555;border-radius:50%;box-sizing:border-box;"></div>`;
    }

    const icon = L.divIcon({ html: iconHtml, className: '', iconAnchor: [6, 6] });
    const countyLabel = d.county ? `${d.county} County<br>` : "";
    const marker = L.marker(c, { icon }).addTo(map);
    marker.bindTooltip(`${d.city}, ${d.stateLabel}<br>${countyLabel}${d.oem}<br>${d.role}`);
    markers.push(marker);
  });
}

async function loadMap() {
  const selectedOEM = document.getElementById('oemSelect').value;

  try {
    const [countyRes, stateRes, mexicoRes] = await Promise.all([
      fetch(countyURL),
      fetch(stateURL),
      fetch(mexicoURL)
    ]);

    const counties = await countyRes.json();
    const states = await stateRes.json();
    const mexico = await mexicoRes.json();

    if (countyLayer) map.removeLayer(countyLayer);
    if (stateLayer)  map.removeLayer(stateLayer);
    if (mexicoLayer) map.removeLayer(mexicoLayer);

    stateLayer = L.geoJSON(states, {
      style: f => styleUSState(f, selectedOEM)
    }).addTo(map);

    countyLayer = L.geoJSON(counties, {
      style: f => getCountyStyle(f, selectedOEM)
    }).addTo(map);

    mexicoLayer = L.geoJSON(mexico, {
      style: f => styleMexicoState(f, selectedOEM)
    }).addTo(map);

    drawMarkers(selectedOEM);

  } catch (err) {
    console.error('Map load error:', err);
    alert('Map failed to load external data. Try opening via a local server or internet connection.');
  }
}

function updateMap() {
  const selected = document.getElementById('oemSelect').value;
  const logo = document.getElementById('oemLogo');
  if (oemLogos[selected]) {
    logo.src = oemLogos[selected];
    logo.style.display = 'block';
  } else {
    logo.style.display = 'none';
  }
  loadMap();
}

loadMap();
</script>
